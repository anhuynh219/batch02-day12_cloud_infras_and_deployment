# ============================================================
# Local full-stack: 1 container chạy cả frontend (dist) + agent API
#   docker compose up --build
#   → http://localhost:8787  (web + /api/plan + /health)
# Secrets đọc từ .env.local (KHÔNG commit).
# ============================================================
services:
  agent:
    build: .
    ports:
      - "8787:8787"
    environment:
      - ENVIRONMENT=production
      - PORT=8787
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

# Render Blueprint (Infrastructure as Code) — build từ Dockerfile.
# Set GEMINI_API_KEY (sync:false) trên dashboard sau khi connect repo.
services:
  - type: web
    name: vinwonders-scheduler
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: GEMINI_API_KEY
        sync: false           # nhập thủ công trên dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: DAILY_CALL_BUDGET
        value: "1000"
